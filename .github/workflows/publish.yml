name: Publish

# Publishes to npm with build provenance when a GitHub Release is published.
# Uses npm "trusted publishing" (OIDC) — no NPM_TOKEN secret required once the
# repo is registered as a trusted publisher for the package on npmjs.com
# (npm package → Settings → Trusted Publisher → GitHub Actions, workflow
# `publish.yml`). To use a token instead, add an NPM_TOKEN secret and set
# NODE_AUTH_TOKEN in the publish step.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for provenance / OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # ensure an npm that supports OIDC trusted publishing
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
